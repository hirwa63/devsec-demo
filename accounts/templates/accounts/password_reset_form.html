<!DOCTYPE html>
<html>
<head>
    <title>Reset Password</title>
    <style>
        body { font-family: Arial; max-width: 600px; margin: 50px auto; }
        .form-card { border: 1px solid #ddd; padding: 20px; border-radius: 5px; }
        input { display: block; margin: 10px 0; padding: 8px; width: 95%; }
        button { background-color: #007bff; color: white; border: none; padding: 10px 15px; cursor: pointer; }
        a { color: #007bff; text-decoration: none; }
        .info { color: #666; font-size: 14px; margin-bottom: 15px; }
    </style>
</head>
<body>
    <h1>Reset Your Password</h1>
    <p class="info">Enter your email address below. If an account exists with that email, we will send you a password reset link.</p>

    <div class="form-card">
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Send Reset Link</button>
        </form>
    </div>

    <div style="margin-top: 15px;">
        <a href="{% url 'login' %}">Back to Login</a>
    </div>
</body>
</html>
