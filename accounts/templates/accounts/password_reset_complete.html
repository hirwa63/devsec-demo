{% extends "accounts/base.html" %}
{% block title %}Password Changed — SecureApp{% endblock %}
{% block page_class %}page-narrow{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Password Changed</h1>
</div>
<div class="card">
    <div class="alert alert-success">Your password has been successfully changed. You can now log in with your new password.</div>
    <a href="{% url 'login' %}" class="btn btn-primary btn-sm">Go to Login</a>
</div>
{% endblock %}
