<!DOCTYPE html>
<html>
<head>
    <title>Password Reset Sent</title>
    <style>
        body { font-family: Arial; max-width: 600px; margin: 50px auto; }
        .info-card { border: 1px solid #ddd; padding: 20px; border-radius: 5px; background-color: #f8f9fa; }
        a { color: #007bff; text-decoration: none; }
    </style>
</head>
<body>
    <h1>Password Reset Email Sent</h1>

    <!-- Security note: This message is intentionally generic to prevent user enumeration.
         The same message is shown whether or not the email exists in the system. -->
    <div class="info-card">
        <p>If an account exists with the email address you entered, you will receive a password reset link shortly.</p>
        <p>If you don't receive an email, please ensure you entered the address you registered with, and check your spam folder.</p>
    </div>

    <div style="margin-top: 15px;">
        <a href="{% url 'login' %}">Back to Login</a>
    </div>
</body>
</html>
