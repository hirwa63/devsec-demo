<!DOCTYPE html>
<html>
<head>
    <title>Set New Password</title>
    <style>
        body { font-family: Arial; max-width: 600px; margin: 50px auto; }
        .form-card { border: 1px solid #ddd; padding: 20px; border-radius: 5px; }
        input { display: block; margin: 10px 0; padding: 8px; width: 95%; }
        button { background-color: #28a745; color: white; border: none; padding: 10px 15px; cursor: pointer; }
        a { color: #007bff; text-decoration: none; }
        .error { color: #dc3545; }
    </style>
</head>
<body>
    {% if validlink %}
        <h1>Set New Password</h1>
        <div class="form-card">
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit">Change Password</button>
            </form>
        </div>
    {% else %}
        <h1>Invalid Reset Link</h1>
        <p class="error">This password reset link is invalid or has already been used.</p>
        <p>Please <a href="{% url 'password_reset' %}">request a new password reset</a>.</p>
    {% endif %}
</body>
</html>
