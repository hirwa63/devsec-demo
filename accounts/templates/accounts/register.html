<!DOCTYPE html>
<html>
<head><title>Register</title></head>
<body>
    <h1>Register</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <input type="hidden" name="next" value="{{ next }}">
        <button type="submit">Register</button>
    </form>
    <p><a href="{% url 'login' %}?next={{ next }}">Login</a></p>
</body>
</html>
