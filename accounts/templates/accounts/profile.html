<!DOCTYPE html>
<html>
<head>
    <title>Profile</title>
    <style>
        body { font-family: Arial; max-width: 600px; margin: 50px auto; }
        .profile-card { border: 1px solid #ddd; padding: 20px; border-radius: 5px; }
        button { background-color: #007bff; color: white; border: none; padding: 10px 15px; cursor: pointer; }
        a { color: #007bff; text-decoration: none; }
        .edit-section { margin-top: 20px; padding-top: 20px; border-top: 1px dashed #ccc; }
    </style>
</head>
<body>
    <h1>User Profile</h1>
    <div class="profile-card">
        <p><strong>Username:</strong> {{ profile.user.username }}</p>
        <p><strong>Role:</strong> {{ profile.role }}</p>
        <p><strong>Display Name:</strong> <span id="display-name-val">{{ profile.display_name|default:"Not set" }}</span></p>
        <p><strong>Account Created:</strong> {{ profile.created_at }}</p>
    </div>

    <!-- AJAX PROFILE UPDATE (CSRF TEST) -->
    <div class="profile-card edit-section">
        <h3>Update Display Name (AJAX)</h3>
        <input type="text" id="new-display-name" placeholder="Enter new name" style="padding: 8px; width: 200px;">
        <button onclick="updateDisplayName()">Update</button>
        <p id="status-msg"></p>
    </div>

    <script>
        // Helper to get CSRF token from cookies
        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }

        async function updateDisplayName() {
            const nameInput = document.getElementById('new-display-name');
            const statusMsg = document.getElementById('status-msg');
            const nameVal = nameInput.value;
            
            const csrftoken = getCookie('csrftoken');

            try {
                const response = await fetch("{% url 'update_display_name' %}", {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                        'X-CSRFToken': csrftoken
                    },
                    body: `display_name=${encodeURIComponent(nameVal)}`
                });

                const data = await response.json();
                if (response.ok) {
                    document.getElementById('display-name-val').innerText = data.display_name;
                    statusMsg.innerText = "Updated successfully!";
                    statusMsg.style.color = "green";
                } else {
                    statusMsg.innerText = `Error: ${data.message || 'Forbidden'}`;
                    statusMsg.style.color = "red";
                }
            } catch (error) {
                statusMsg.innerText = "Request failed.";
                statusMsg.style.color = "red";
            }
        }
    </script>

    <div style="margin-top: 20px;">
        <p><a href="{% url 'home' %}">Back to Dashboard</a></p>
        <form action="{% url 'logout' %}" method="post">
            {% csrf_token %}
            <button type="submit" style="background-color: #dc3545;">Logout</button>
        </form>
    </div>
</body>
</html>
