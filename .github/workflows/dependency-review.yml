name: Dependency Review

on:
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          # Fail the workflow if any dependency with a CVE score ≥ HIGH is introduced
          fail-on-severity: high
          # Comment on the PR with a summary of dependency changes
          comment-summary-in-pr: always
