{% extends "uwamahoro_joseline/base.html" %}

{% block content %}
<div class="card">
    <h1>Logout</h1>
    <p>Are you sure you want to logout?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" style="background: #667eea; color: white; padding: 0.75rem 1.5rem; border: none; border-radius: 4px; cursor: pointer;">Confirm Logout</button>
    </form>
    <p style="margin-top: 1rem;"><a href="{% url 'dashboard' %}">Cancel</a></p>
</div>
{% endblock %}
