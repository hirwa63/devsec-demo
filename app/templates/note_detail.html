{% extends "base.html" %}
{% block title %}{{ note.title }} – SecureNotes{% endblock %}
{% block content %}
<h2>{{ note.title }}</h2>
<small>Created: {{ note.created_at.strftime('%Y-%m-%d %H:%M') }} UTC</small>
<p>{{ note.content }}</p>
<a href="{{ url_for('main.edit_note', note_id=note.id) }}" class="btn">Edit</a>
<form method="POST" action="{{ url_for('main.delete_note', note_id=note.id) }}" style="display:inline">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <button type="submit" class="danger" onclick="return confirm('Delete this note?')">Delete</button>
</form>
<br><br>
<a href="{{ url_for('main.index') }}">← Back to My Notes</a>
{% endblock %}
